version: '3.8'

services:
  c2-server:
    build: .
    container_name: c2-server
    ports:
      - "8443:8443"
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8443
      - FLASK_DEBUG=false
      - DATABASE_URL=sqlite:////app/data/c2.db
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - c2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching/rate limiting
  redis:
    image: redis:7-alpine
    container_name: c2-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - c2-network
    command: redis-server --appendonly yes

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: c2-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - c2-network

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: c2-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - c2-network
    depends_on:
      - prometheus

networks:
  c2-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
