<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <title>Login — C2:PANEL.ROG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-page">

  <!-- Grid background -->
  <div class="login-bg-grid"></div>

  <!-- Ambient glows -->
  <div class="login-glow" style="width:500px;height:500px;background:var(--accent);top:-150px;left:-150px;opacity:.05"></div>
  <div class="login-glow" style="width:360px;height:360px;background:var(--red);bottom:-100px;right:-100px;opacity:.04"></div>
  <div class="login-glow" style="width:240px;height:240px;background:var(--purple);top:55%;left:65%;opacity:.035"></div>

  <!-- Login card -->
  <div class="login-box">

    <!-- Header -->
    <div class="title">
      <h1>C2<span style="color:var(--red)">:</span>PANEL<span style="color:var(--text-dim);font-size:.55em;letter-spacing:3px">.ROG</span></h1>
      <p>Command &amp; Control</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" action="/login" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="operator"
          autofocus
          autocomplete="username"
          spellcheck="false">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password">
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin:16px 0 6px">
        <input
          type="checkbox"
          name="remember"
          id="remember"
          style="width:auto;flex-shrink:0">
        <label for="remember" style="
          margin:0;text-transform:none;letter-spacing:0;
          font-size:12px;color:var(--text-dim);font-weight:400;cursor:pointer">
          Remember me
        </label>
      </div>

      <button type="submit" class="btn primary">ACCESS SYSTEM</button>
    </form>

    <div class="login-footer">
      C2:PANEL.ROG &bull; ENCRYPTED &bull; v2.0
    </div>
  </div>

</div>

</body>
</html>
