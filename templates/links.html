<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortener - gbctwoserver.net</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input::placeholder { color: #888; }
        button {
            width: 100%;
            padding: 14px;
            background: #f38020;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #e56d00; }
        .result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,255,0,0.1);
            border-radius: 8px;
            border: 1px solid rgba(0,255,0,0.3);
        }
        .result.show { display: block; }
        .short-url {
            font-size: 24px;
            color: #4ade80;
            word-break: break-all;
            margin: 10px 0;
        }
        .copy-btn {
            width: auto;
            padding: 8px 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        .links-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .links-table th, .links-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .links-table th { color: #888; font-weight: 500; }
        .links-table a { color: #4ade80; text-decoration: none; }
        .links-table a:hover { text-decoration: underline; }
        .clicks { color: #f38020; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Link Shortener</h1>
        <p class="subtitle">Create short links: gbctwoserver.net/go/xxx</p>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">Create Short Link</h3>
            <input type="url" id="targetUrl" placeholder="Enter URL to shorten (e.g., https://google.com)">
            <select id="maskType">
                <option value="cloudflare">Cloudflare (dash.cloudflare.com)</option>
                <option value="google">Google (accounts.google.com)</option>
                <option value="github">GitHub (github.com)</option>
                <option value="microsoft">Microsoft (login.microsoftonline.com)</option>
            </select>
            <button onclick="createLink()">Create Short Link</button>
            
            <div class="result" id="result">
                <div style="color: #888; font-size: 14px;">Your short link:</div>
                <div class="short-url" id="shortUrl"></div>
                <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">Recent Links</h3>
            <table class="links-table" id="linksTable">
                <thead>
                    <tr>
                        <th>Short Link</th>
                        <th>Target URL</th>
                        <th>Clicks</th>
                    </tr>
                </thead>
                <tbody id="linksBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        async function createLink() {
            const targetUrl = document.getElementById('targetUrl').value;
            const maskType = document.getElementById('maskType').value;
            
            if (!targetUrl) {
                alert('Please enter a URL');
                return;
            }
            
            try {
                const res = await fetch('/api/links/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({target_url: targetUrl, mask_type: maskType})
                });
                
                const data = await res.json();
                
                document.getElementById('shortUrl').textContent = data.short_url;
                document.getElementById('result').classList.add('show');
                
                // Refresh list
                loadLinks();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        
        async function loadLinks() {
            try {
                const res = await fetch('/api/links');
                const links = await res.json();
                const tbody = document.getElementById('linksBody');
                
                tbody.innerHTML = '';
                
                const sorted = Object.entries(links).sort((a, b) => 
                    new Date(b[1].created_at) - new Date(a[1].created_at)
                ).slice(0, 10);
                
                for (const [code, link] of sorted) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="/go/${code}" target="_blank">/go/${code}</a></td>
                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">
                            <a href="${link.target_url}" target="_blank">${link.target_url}</a>
                        </td>
                        <td class="clicks">${link.clicks || 0}</td>
                    `;
                    tbody.appendChild(tr);
                }
            } catch (e) {
                console.error('Error loading links:', e);
            }
        }
        
        function copyLink() {
            const url = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(url);
            alert('Copied!');
        }
        
        // Load on start
        loadLinks();
    </script>
</body>
</html>
