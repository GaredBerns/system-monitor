# C2 Server Configuration
# Main configuration file

server:
  host: "0.0.0.0"
  port: 5000
  debug: false
  workers: auto  # auto = CPU cores * 2 + 1
  
security:
  secret_key: null  # Auto-generated if null
  session_lifetime_hours: 12
  max_login_attempts: 5
  login_lockout_minutes: 15
  
database:
  type: sqlite
  path: data/c2.db
  pool_size: 10
  
logging:
  level: INFO
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  file: logs/c2-server.log
  max_size_mb: 100
  backup_count: 5
  
agents:
  timeout_seconds: 300
  max_agents: 100
  heartbeat_interval: 30
  
modules:
  scanner:
    enabled: true
    interval: 300
  counter_surveillance:
    enabled: true
    tor: true
  exploits:
    enabled: true
  kaggle:
    enabled: true
    poll_interval: 30
    
webhooks:
  discord: null
  telegram: null
  
upload:
  max_size_mb: 16
  allowed_extensions:
    - txt
    - pdf
    - png
    - jpg
    - jpeg
    - zip
    - tar
    - gz
